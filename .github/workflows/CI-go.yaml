# CI for the Go build (./togo), running parallel to the Node CI. No JDK matrix
# yet: no milestone-1 command invokes javac. The build job cross-compiles the
# statically linked release binaries (CGO_ENABLED=0) for every target.

name: CI (Go)

on:
  push:
    branches:
      - main
  pull_request:

defaults:
  run:
    working-directory: togo

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: togo/go.sum

      # javac lets the publish testcontainers e2e build a real jar (Docker is
      # available on GitHub-hosted runners); without it the e2e skips itself.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Format check (gofmt)
        run: test -z "$(gofmt -l .)" || { echo "unformatted files:"; gofmt -l .; exit 1; }

      - name: Generated code is up to date
        run: |
          go install github.com/mailru/easyjson/easyjson@latest
          make generate-check

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: togo

      - run: go vet ./...
      - run: go test -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: togo/coverage.out
          flags: go
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build static binaries
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: togo/go.sum

      - run: make build-all

      - uses: actions/upload-artifact@v7
        with:
          name: cappu-go-binaries
          path: togo/dist/*
