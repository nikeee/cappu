name: CD

on:
  push:
    branches:
      - "!*"
    tags:
      - "v*"

jobs:
  test:
    name: Test
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: npm

      - run: npm ci --no-audit
      - run: node --run ci
      - run: node --run build
