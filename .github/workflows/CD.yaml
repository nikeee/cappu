name: CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  test:
    name: Test
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: ./togo/go.sum

      - run: make tools
        working-directory: ./togo
      - run: make generate
        working-directory: ./togo
      - run: make build-all
        working-directory: ./togo

  release:
    name: Release
    runs-on: ubuntu-slim
    needs: test
    # Releases are cut by pushing a vX.Y.Z tag. The asset filenames are exactly
    # what `cappu self-upgrade` looks for (cappu-<os>-<arch>, windows keeps .exe).
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: ./togo/go.sum

      # Stamp the binaries with the tag version (vX.Y.Z -> X.Y.Z) so the shipped
      # `cappu --version` matches the release.
      - run: make build-all VERSION="${GITHUB_REF_NAME#v}"
        working-directory: ./togo

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            togo/dist/cappu-linux-x64 \
            togo/dist/cappu-linux-arm64 \
            togo/dist/cappu-darwin-arm64 \
            togo/dist/cappu-win-x64.exe \
            --generate-notes

  image:
    name: Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: "ghcr.io/nikeee/cappu"
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/login-action@v4
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
