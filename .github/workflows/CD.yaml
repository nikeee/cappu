name: CD

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: npm

      - run: npm ci --no-audit
      - run: node --run ci

      # @tsdown/exe extracts the Windows Node .zip with `tar`, which must be
      # libarchive's (GNU tar cannot read zip). Shim `tar` -> `bsdtar` for the
      # build only. macOS x64 and Alpine/musl are not built (Node SEA limits).
      - name: Build the single-executable binaries
        run: |
          sudo apt-get update && sudo apt-get install -y libarchive-tools
          mkdir -p /tmp/bin && ln -sf "$(command -v bsdtar)" /tmp/bin/tar
          PATH="/tmp/bin:$PATH" node --run build

      # The artifact names stay cappu-<os>-<arch>; the files carry tsdown's
      # platform suffix (win, not windows, and a .exe).
      - uses: actions/upload-artifact@v7
        with:
          name: cappu-linux-x64
          path: dist/cappu-linux-x64
      - uses: actions/upload-artifact@v7
        with:
          name: cappu-linux-arm64
          path: dist/cappu-linux-arm64
      - uses: actions/upload-artifact@v7
        with:
          name: cappu-darwin-arm64
          path: dist/cappu-darwin-arm64
      - uses: actions/upload-artifact@v7
        with:
          name: cappu-windows-x64
          path: dist/cappu-win-x64.exe

  image:
    name: Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: "ghcr.io/nikeee/cappu"
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/login-action@v4
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
