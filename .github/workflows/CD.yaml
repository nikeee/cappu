name: CD

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: ./togo/go.sum

      - run: make tools
        working-directory: ./togo
      - run: make generate
        working-directory: ./togo
      - run: make build-all
        working-directory: ./togo

      # The artifact names stay cappu-<os>-<arch>
      - uses: actions/upload-artifact@v7
        with:
          name: cappu-linux-x64
          path: ./togo/dist/cappu-linux-x64
      - uses: actions/upload-artifact@v7
        with:
          name: cappu-linux-arm64
          path: ./togo/dist/cappu-linux-arm64
      - uses: actions/upload-artifact@v7
        with:
          name: cappu-darwin-arm64
          path: ./togo/dist/cappu-darwin-arm64
      - uses: actions/upload-artifact@v7
        with:
          name: cappu-windows-x64
          path: ./togo/dist/cappu-win-x64.exe

  image:
    name: Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: "ghcr.io/nikeee/cappu"
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/login-action@v4
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
