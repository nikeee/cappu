# Test matrix: the suite must be green WITHOUT a JDK (javac-dependent tests
# skip), WITH preinstalled JDKs (21/25), with a JDK that cappu PROVISIONED
# itself (#8 - also the only javac in that container), and with the
# experimental compiler driving the example builds end-to-end. The plain
# node container masks Ubuntu's preinstalled JDK.

name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.jdk }})
    runs-on: ubuntu-latest
    container: node:26
    strategy:
      fail-fast: false
      matrix:
        jdk: ["none", "21", "25", "provisioned", "experimental"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        if: matrix.jdk == '21' || matrix.jdk == '25' || matrix.jdk == 'experimental'
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk == 'experimental' && '21' || matrix.jdk }}

      - run: npm ci --no-audit

      # cappu provisions its own JDK (#8); its bin/ becomes the only
      # javac/java this leg has.
      - name: Provision a JDK through cappu
        if: matrix.jdk == 'provisioned'
        run: |
          mkdir /tmp/jdk-project
          echo '{"jdk": "temurin-21"}' > /tmp/jdk-project/cappu.json
          (cd /tmp/jdk-project && "$GITHUB_WORKSPACE/node_modules/.bin/tsx" "$GITHUB_WORKSPACE/src/cli/main.ts" install)
          echo "/tmp/jdk-project/.cappu/jdks/temurin-21/bin" >> "$GITHUB_PATH"

      - run: node --run ci
      - run: node --run typecheck
      # The corpus submodules stay uninitialized here: their tests skip, and
      # cloning five upstream projects is not worth the CI minutes per run.
      - run: node --run test
        if: matrix.jdk != '21'
        env:
          # the experimental leg compiles the examples with cappu's own
          # compiler instead of javac
          CAPPU_EXAMPLES_EXPERIMENTAL: ${{ matrix.jdk == 'experimental' && '1' || '' }}

      # The '21' leg runs the suite under coverage instead and uploads it; one
      # leg is enough, the rest just run plain `test`.
      - run: node --run coverage
        if: matrix.jdk == '21'

      - name: Upload coverage to Codecov
        if: matrix.jdk == '21'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.lcov
          flags: ts
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
