name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.jdk == 'none' && 'no JDK' || format('JDK {0}', matrix.jdk) }})
    runs-on: ubuntu-latest
    container: node:26
    strategy:
      fail-fast: false
      matrix:
        jdk: ["none", "21", "25"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        if: matrix.jdk != 'none'
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}

      - run: npm ci --no-audit
      - run: node --run ci
      - run: node --run typecheck
      # The corpus submodules stay uninitialized here: their tests skip, and
      # cloning five upstream projects is not worth the CI minutes per run.
      - run: node --run test
