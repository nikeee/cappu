# golangci-lint v2 config for the Go build. Seeded from the spirit of tsgo's
# .golangci.yml (its custom AST linters under _tools/customlint are dropped -
# they are TypeScript-AST specific). Formatting is handled by gofmt.
version: "2"

linters:
  default: standard # govet, ineffassign, staticcheck, unused, errcheck
  enable:
    - bodyclose # HTTP response bodies must be closed (the Maven source)
    - errorlint # %w / errors.Is correctness
    - gocritic
    - misspell
    - revive
    - unconvert
    - usestdlibvars
  settings:
    revive:
      rules:
        - name: exported
          disabled: true # doc comments are present but revive's heuristics are noisy
    errcheck:
      # Writes to the terminal and body closes are fine to ignore here.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
    staticcheck:
      # ST1005: CLI error strings are intentionally capitalized to mirror the
      # Node build's parseArgs messages ("Unknown option '--x'").
      checks: ["all", "-ST1005"]

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
